- name: Nettoyage complet utilisateur
  hosts: all
  become: yes
  become_method: sudo
  become_flags: '-H'

  vars:
    username: 
    ansible_remote_tmp: /tmp/.ansible

  environment:
    ANSIBLE_REMOTE_TMP: /tmp/.ansible

  tasks:

    - name: Kill tous les processus de l'utilisateur
      shell: pkill -u {{ username }}
      ignore_errors: yes

    - name: Supprimer le user (et son home)
      user:
        name: "{{ username }}"
        state: absent
        remove: yes
        force: yes

    - name: Supprimer le dossier home restant
      file:
        path: "/home/{{ username }}"
        state: absent
      ignore_errors: yes

    - name: Nettoyer clés SSH root
      lineinfile:
        path: /root/.ssh/authorized_keys
        regexp: "{{ username }}"
        state: absent
      ignore_errors: yes

    - name: Supprimer cron user
      file:
        path: "/var/spool/cron/{{ username }}"
        state: absent
      ignore_errors: yes

    - name: Nettoyer sudoers.d
      file:
        path: "/etc/sudoers.d/{{ username }}"
        state: absent
      ignore_errors: yes

    - name: Supprimer sudoers global
      lineinfile:
        path: /etc/sudoers
        regexp: "{{ username }}"
        state: absent
        validate: 'visudo -cf %s'
      ignore_errors: yes

    - name: Audit SSH keys restantes
      shell: "grep -rl '{{ username }}' /home/*/.ssh/ || true"
      register: ssh_scan

    - debug:
        var: ssh_scan.stdout_lines
